<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI reviewer diagnostics workflow teaser</title>
  <desc id="desc">A black-box automated reviewer is tested with paired original and perturbed inputs. The toolkit compares score and decision shifts and produces aspect-level diagnostic reports.</desc>
  <defs>
    <style>
      .bg{fill:#fbfaf6}.panel{fill:#fffdf8;stroke:#d8d3c7;stroke-width:1.4}.muted{fill:#6b675f}.title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24231f}.subtitle{font:500 18px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#5c5850}.h{font:700 21px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#24231f}.t{font:500 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#4f4b45}.small{font:500 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#69645c}.purple{fill:#eeedfe;stroke:#534ab7}.teal{fill:#e1f5ee;stroke:#0f6e56}.coral{fill:#faece7;stroke:#993c1d}.blue{fill:#e6f1fb;stroke:#185fa5}.amber{fill:#faeeda;stroke:#854f0b}.line{fill:none;stroke:#6f6a61;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.dash{stroke-dasharray:6 7}.pill{stroke-width:1.5}.metric{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.metriclabel{font:600 13px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#5d5851}.code{font:600 14px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#36332e}
      @media (prefers-color-scheme: dark){.bg{fill:#171713}.panel{fill:#20201b;stroke:#555047}.title{fill:#f3efe5}.subtitle,.t{fill:#cfc7ba}.h{fill:#f3efe5}.small,.muted{fill:#aaa296}.purple{fill:#26215c;stroke:#afa9ec}.teal{fill:#04342c;stroke:#9fe1cb}.coral{fill:#4a1b0c;stroke:#f0997b}.blue{fill:#042c53;stroke:#85b7eb}.amber{fill:#412402;stroke:#fac775}.line{stroke:#aaa296}.code{fill:#e7dfd2}.metriclabel{fill:#cfc7ba}}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="630" rx="0"/>
  <text class="title" x="72" y="78">Where do automated reviewers go wrong?</text>
  <text class="subtitle" x="72" y="112">A plug-and-play diagnostic toolkit for black-box peer-review systems</text>
  <rect class="panel" x="54" y="142" width="1092" height="404" rx="28"/>

  <g transform="translate(92 192)">
    <rect class="purple pill" x="0" y="0" width="220" height="86" rx="18"/>
    <text class="h" x="110" y="32" text-anchor="middle">Original inputs</text>
    <text class="t" x="110" y="58" text-anchor="middle">paper · review · rebuttal</text>
    <rect class="coral pill" x="0" y="126" width="220" height="86" rx="18"/>
    <text class="h" x="110" y="158" text-anchor="middle">Perturbed inputs</text>
    <text class="t" x="110" y="184" text-anchor="middle">soundness · tone · factuality</text>
  </g>

  <path class="line" d="M330 235 C380 235 388 266 428 266" marker-end="url(#arrow)"/>
  <path class="line" d="M330 361 C380 361 388 330 428 330" marker-end="url(#arrow)"/>

  <g transform="translate(446 224)">
    <rect class="teal pill" x="0" y="0" width="278" height="148" rx="22"/>
    <text class="h" x="139" y="38" text-anchor="middle">Any review system</text>
    <text class="t" x="139" y="70" text-anchor="middle">GPT · Gemini · vLLM · custom</text>
    <rect class="panel" x="42" y="94" width="194" height="34" rx="10"/>
    <text class="code" x="139" y="116" text-anchor="middle">scores + decisions</text>
  </g>

  <path class="line" d="M742 298 L826 298" marker-end="url(#arrow)"/>

  <g transform="translate(842 190)">
    <rect class="blue pill" x="0" y="0" width="236" height="216" rx="22"/>
    <text class="h" x="118" y="36" text-anchor="middle">Diagnostics CLI</text>
    <text class="code" x="118" y="70" text-anchor="middle">ai-reviewer-diagnostics</text>
    <line class="line dash" x1="42" y1="96" x2="194" y2="96"/>
    <text class="metric" x="60" y="144" fill="#185fa5">Δ</text>
    <text class="metriclabel" x="118" y="136" text-anchor="middle">score shifts</text>
    <text class="metric" x="60" y="188" fill="#185fa5">%</text>
    <text class="metriclabel" x="146" y="180" text-anchor="middle">decision changes</text>
  </g>

  <path class="line" d="M928 410 C890 434 832 438 800 458" marker-end="url(#arrow)"/>
  <path class="line" d="M992 410 C1012 430 1016 438 1018 450" marker-end="url(#arrow)"/>

  <g transform="translate(480 440)">
    <rect class="amber pill" x="0" y="0" width="306" height="72" rx="18"/>
    <text class="h" x="153" y="29" text-anchor="middle">Aspect-level reports</text>
    <text class="t" x="153" y="53" text-anchor="middle">markdown + JSON for papers and audits</text>
  </g>

  <g transform="translate(906 458)">
    <rect class="panel" x="0" y="0" width="202" height="72" rx="18"/>
    <text class="h" x="101" y="29" text-anchor="middle">Community reuse</text>
    <text class="small" x="101" y="53" text-anchor="middle">pip · GitHub · HF dataset</text>
  </g>

  <g transform="translate(76 568)">
    <rect class="purple pill" x="0" y="0" width="166" height="32" rx="16"/>
    <text class="small" x="83" y="21" text-anchor="middle">black-box evaluation</text>
    <rect class="teal pill" x="180" y="0" width="140" height="32" rx="16"/>
    <text class="small" x="250" y="21" text-anchor="middle">paired outputs</text>
    <rect class="blue pill" x="334" y="0" width="142" height="32" rx="16"/>
    <text class="small" x="405" y="21" text-anchor="middle">CLI reports</text>
    <rect class="amber pill" x="490" y="0" width="180" height="32" rx="16"/>
    <text class="small" x="580" y="21" text-anchor="middle">CIKM 2025 companion</text>
  </g>
</svg>
