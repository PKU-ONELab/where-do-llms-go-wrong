name: smoke-test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install lightweight dependencies
        run: pip install -r requirements-core.txt
      - name: Run API-free smoke test
        run: make smoke-test
