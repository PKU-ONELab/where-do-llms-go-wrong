name: smoke-test

on:
  push:
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Run zero-dependency quickstart
        run: make quickstart
      - name: Install lightweight dependencies
        run: uv sync
      - name: Run API-free smoke test
        run: uv run make smoke-test
